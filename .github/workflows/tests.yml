name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      # require-dev pulls pylon/arcos from Packagist — Support-tier tests
      # (RuntimeBridge, NewProject) need a real install of it to boot the
      # checked-in fixture project and to scaffold+install real throwaway
      # projects respectively.
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run unit + support tests
        run: composer test

      - name: Run fixtures suite (advisory — does not block)
        run: composer test:fixtures
        continue-on-error: true
